name: Prepare release notes PR

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump strategy for Changie batching
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency: prepare-release-${{ github.ref }}

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Prepare release notes PR can only be run from the 'main' branch."
            exit 1
          fi

      - name: Check for unreleased fragments
        shell: bash
        run: |
          shopt -s nullglob
          fragments=(.changes/unreleased/*.yaml)
          if [ ${#fragments[@]} -eq 0 ]; then
            echo "::error::No unreleased Changie fragments were found."
            exit 1
          fi

          printf 'Found %s unreleased fragment(s).\n' "${#fragments[@]}"

      - name: Verify release label exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/labels/release" >/dev/null; then
            echo "Release label exists."
            exit 0
          fi

          echo "::error::Required release label 'release' does not exist. Create it before running this workflow."
          exit 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Changie v1.24.0
        run: go install github.com/miniscruff/changie@v1.24.0

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Batch release notes
        run: changie batch "${{ inputs.release_type }}"

      - name: Merge changelog
        run: changie merge

      - name: Detect release changes
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md .changes; then
            echo "::error::Changie did not produce any release changes."
            exit 1
          fi

      - name: Create or update release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch-token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "release: prepare release notes"
          branch: release/changelog
          delete-branch: false
          base: main
          title: "release: prepare release notes"
          body: |
            ## Summary
            - Batch pending Changie fragments from `main`
            - Merge the generated release notes into `CHANGELOG.md`
            - Generated by the manual **Prepare release notes PR** workflow using `${{ inputs.release_type }}` batching
            - Marked with the `release` label so merging `release/changelog` automatically publishes the prepared release

            ## Notes
            - Review the generated changelog content before merging
            - Merge this labeled `release/changelog` PR to automatically run **Publish release tag and GitHub Release**
          labels: |
            release
          add-paths: |
            CHANGELOG.md
            .changes
