name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump strategy for Changie batching
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency: release-${{ github.ref }}

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release workflow can only be run from the 'main' branch."
            exit 1
          fi

      - name: Check for unreleased fragments
        id: fragments
        shell: bash
        run: |
          shopt -s nullglob
          fragments=(.changes/unreleased/*.yaml)
          if [ ${#fragments[@]} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No unreleased Changie fragments found."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          printf 'Found %s unreleased fragment(s).\n' "${#fragments[@]}"

      - name: Set up Go
        if: steps.fragments.outputs.found == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Changie v1.24.0
        if: steps.fragments.outputs.found == 'true'
        run: go install github.com/miniscruff/changie@v1.24.0

      - name: Build
        if: steps.fragments.outputs.found == 'true'
        run: go build ./...

      - name: Test
        if: steps.fragments.outputs.found == 'true'
        run: go test ./...

      - name: Batch release notes
        if: steps.fragments.outputs.found == 'true'
        shell: bash
        run: |
          changie batch "${{ inputs.release_type }}"

      - name: Merge changelog
        if: steps.fragments.outputs.found == 'true'
        run: changie merge

      - name: Detect release changes
        if: steps.fragments.outputs.found == 'true'
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md .changes; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Changie did not produce any release changes."
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release PR
        if: steps.fragments.outputs.found == 'true' && steps.changes.outputs.created == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch-token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: prepare release notes"
          branch: release/changelog
          delete-branch: false
          base: main
          title: "chore: prepare release notes"
          body: |
            ## Summary
            - Batch pending Changie fragments from `main`
            - Merge the generated release notes into `CHANGELOG.md`
            - Generated by the manual Release workflow using `${{ inputs.release_type }}` batching

            ## Notes
            - Review the generated changelog content before merging
            - Tagging and GitHub Release publishing still happen separately
          add-paths: |
            CHANGELOG.md
            .changes

      - name: Log no-op result
        if: steps.fragments.outputs.found != 'true' || steps.changes.outputs.created != 'true'
        run: echo "No release PR changes were generated."
