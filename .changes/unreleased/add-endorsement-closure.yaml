kind: added
body: Add a bounded `endorsementClosure(where, first, after)` GraphQL connection for Certified endorsement networks. The resolver computes active account-to-account endorsement badge edges at request time, respects badge-definition issuer allowlists, supports exact degree filtering from 1 through 3, returns predecessor provenance, and marks responses truncated when the server-side cap is reached.
custom:
  Affects: user
